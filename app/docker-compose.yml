version: "3.9"
services:
  db:
    image: postgres:16
    container_name: poschair_db
    environment:
      POSTGRES_USER: poschair
      POSTGRES_PASSWORD: poschair
      POSTGRES_DB: poschair
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poschair -d poschair"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: poschair_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://poschair:poschair@db:5432/poschair
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: poschair_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
